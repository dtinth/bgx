name: Release

# Releases are driven by release-please from Conventional Commits on main.
# Every push to main updates a "release PR" that bumps the version and
# CHANGELOG. Merging that PR creates the GitHub Release + tag, and the
# goreleaser job then attaches the cross-compiled binaries to it.
on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      id-token: write # federate a token via OIDC (Octo STS)
      contents: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Exchange the workflow's OIDC token for a short-lived GitHub App token so
      # the release PR triggers CI and is authored by the app (see the trust
      # policy in .github/chainguard/release-please.sts.yaml).
      - name: Federate a GitHub App token
        uses: octo-sts/action@v1.1.1
        id: octo-sts
        with:
          scope: dtinth/bgx
          identity: release-please

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.octo-sts.outputs.token }}

  goreleaser:
    name: GoReleaser
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload build artifacts to the release
    steps:
      - name: Check out the released tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
