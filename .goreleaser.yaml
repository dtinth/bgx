# GoReleaser configuration for bgx
# Docs: https://goreleaser.com
#
# Release flow:
#   git tag v1.0.0 && git push origin v1.0.0
# The tag push triggers .github/workflows/release.yml, which runs this config.
#
# The produced assets (e.g. bgx_Linux_x86_64.tar.gz) are named with OS/arch
# tokens that mise's `github:` backend (ubi-style detection) resolves
# automatically, so `mise use -g github:dtinth/bgx` just works.
version: 2

project_name: bgx

before:
  hooks:
    - go mod tidy

builds:
  - id: bgx
    main: .
    binary: bgx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: bgx
    formats: [tar.gz]
    # Windows archives use zip, matching the convention ubi/mise expect.
    format_overrides:
      - goos: windows
        formats: [zip]
    # Name template chosen for ubi/mise auto-detection: Linux/Darwin/Windows +
    # x86_64/arm64.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  # release-please creates the GitHub Release (with the changelog) before this
  # runs; keep it and just upload the built archives + checksums to it.
  mode: keep-existing
